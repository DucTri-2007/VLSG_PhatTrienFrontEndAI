<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form HTML</title>
</head>
<body>
    <Form>
        <!-- test -->
         <label for="username">Nhap username</label>
         <input type="text" id="username" placeholder="Username">
         <br><br>
         <!-- password -->
          <label for="pass">Nhap password</label>
          <input type="password" id="pass" placeholder="Password">
          <br><br>
          <!-- email -->
           <label for="email">Nhap Email</label>
           <input type="Email" id="email" placeholder="Email">
           <br><br>
           <!-- number -->
            <label for="age">Nhap tuoi</label>
            <input type="Age" id="age" placeholder="Tuoi">
            <br><br>
            <!-- Nhap tel -->
             <label for="sdt">Nhap STD</label>
             <input type="STD" id="std" placeholder="SDT">
             <br><br>
             <!-- Gioi tinh -->
              <label for="">Chon gioi tinh</label>
              <input type="radio"> Nam
              <input type="radio"> Nu
              <br><br>
              <!-- Checkbox -->
               <label for="">So thich</label>
               <input type="checkbox">Shopping
               <input type="checkbox"> Travel
               <input type="checkbox"> Go to the pub
               <br><br>
               <!-- Color -->
                <label for="">Chon mau</label>
                <input type="color">
                <br><br>
                <!-- date -->
                 <label for="">Chon ngay</label>
                 <input type="date">
                 <br><br>
                 <!-- time -->
                  <label for="">Chon time</label>
                  <input type="time">
                  <br><br>
                  <!-- file -->
                   <label for="">Chon anh</label>
                   <input type="file">
                   <br><br>
                   <!-- Gioi thieu ban than -->
                    <label for="">Gioi thieu ban than</label>
                    <textarea name="" id=""></textarea>
                    <br><br>
                    <!-- Chon quoc gia -->
                     <label for="">Chon quoc gia</label>
                     <select>
                        <option>VietNam</option>
                        <option>ThaiLan</option>
                     </select>
                     <br><br>
                     <!-- Nut gui du lieu -->
                      <input type="submit" value="Gui">
                      <input type="reset" value="Reset">
    </Form>
</body>
</html>
